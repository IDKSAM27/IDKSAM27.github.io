<svg xmlns="http://www.w3.org/2000/svg" viewBox="46 41 124 124" width="100%" height="100%">
  <style>
    .circle-anim {
      stroke-dasharray: 100 120;
      stroke-dashoffset: 120;
      animation: draw-circle 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }
    .line-anim {
      stroke-dasharray: 100 120;
      stroke-dashoffset: 120;
      animation: draw-line 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }
    @keyframes draw-circle {
      0%, 15% { stroke-dashoffset: 120; }
      45%, 100% { stroke-dashoffset: 0; }
    }
    @keyframes draw-line {
      0%, 45% { stroke-dashoffset: 120; }
      75%, 100% { stroke-dashoffset: 0; }
    }
  </style>
  <path class="circle-anim" pathLength="100" d="M 138 78 C 138 50, 95 48, 85 78 C 76 108, 108 128, 128 116 C 148 104, 148 80, 128 72" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <line class="line-anim" pathLength="100" x1="68" y1="138" x2="108" y2="158" stroke="#22d3ee" stroke-width="14" stroke-linecap="round"/>
</svg>